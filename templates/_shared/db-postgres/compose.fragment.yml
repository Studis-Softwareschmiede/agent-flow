# compose.fragment.yml — db-postgres template (Welle 2, Spec §5 + §6 + §16-R4)
#
# Kein vollständiger compose-file — nur die Postgres-Service-Blöcke, die
# beim Scaffold (/new-project, /adopt) ans Projekt-`docker-compose.yml`
# angehängt werden. Das Projekt-Default-Netzwerk (compose-implicit) wird
# benutzt; die App-Services müssen im selben Compose-Projekt liegen, um
# `db` per DNS aufzulösen.
#
# Pflicht-Felder (Spec §5):
#   - restart: unless-stopped
#   - healthcheck via pg_isready
#   - eindeutiges named volume `db_data`
#   - Port-Mapping via env (Preview-Konflikt-Vermeidung)
#   - Passwort via env_file (NIE hardkodiert; .env.gpg ist Source of Truth)
#
# Migrations-Service (Spec §16-R4):
#   - separates one-shot Image (gleicher postgres:16-alpine-Tag → image-reuse)
#   - bringt psql mit, ohne dass die App-Images einen DB-Client backen müssen
#   - läuft NACH `db: service_healthy`, BEVOR App-Services starten

services:
  db:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-app}_db
    restart: unless-stopped
    env_file:
      - .env.db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-app}\" -d \"${POSTGRES_DB:-app}\""]
      interval: 5s
      timeout: 3s
      retries: 20
    # ports:
    #   - "${DB_PORT:-5432}:5432"
    # ^ Preview/Dev nur. In Production ENTFERNEN (Spec §15-R7).

  migrations:
    image: postgres:16-alpine
    container_name: ${PROJECT_NAME:-app}_migrations
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.db
    environment:
      DB_HOST: db
    entrypoint: ["/db_scripts/run-migrations.sh"]
    volumes:
      - ./db_scripts:/db_scripts:ro

volumes:
  db_data: {}
