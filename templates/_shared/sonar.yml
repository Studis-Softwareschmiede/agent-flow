# Vorlage — von new-project/adopt nach .github/workflows/sonar.yml kopiert, WENN
# profile.sonar.edition != none. Diese Vorlage ist die JAVA/MAVEN-Variante.
#
# WICHTIG (siehe knowledge/quality/sonar.md):
#  - Scanner-Runtime != App-Runtime: SonarCloud erzwingt Java 17 für den Scanner.
#    Build/Test laufen auf der App-JDK (__APP_JAVA_VERSION__), der Scanner-Step auf Java 17.
#  - Non-blocking-Guard: ohne Org-Secret SONAR_TOKEN wird alles sauber übersprungen.
#  - TRIGGER (Fabrik-Default, siehe knowledge/quality/sonar.md §1a): MONATLICH + MANUELL.
#    BEWUSST KEIN push/pull_request — der re-analysierte bei jedem Push auf einen offenen
#    PR-Branch (synchronize) und sprengt Actions-Minuten/Limits. Stattdessen periodische
#    Baseline (cron) + Handstart (workflow_dispatch). Gilt identisch für SonarCloud und
#    SonarQube-CE — ohne PR-Trigger entfällt die CE-Sonderbehandlung.
#    · Manuell: Actions-Tab -> "Run workflow", oder `gh workflow run "SonarCloud Analysis"`.
#    · Scheduled-Workflows laufen nur auf dem Default-Branch; GitHub pausiert sie nach
#      60 Tagen Repo-Inaktivität automatisch (dann einmal manuell re-aktivieren).
#    · Kein per-PR-Sonar-Gate mehr in /flow -> Pre-Merge-Qualität trägt der reviewer
#      (Pack-Regeln); Sonar ist periodischer Monitor + Futter für /retro --sonar.
#  - Nicht-Java (js/angular/flutter/html): diese Vorlage NICHT nutzen — stattdessen
#    sonar-scanner CLI (SonarSource/sonarqube-scan-action) + sonar-project.properties,
#    siehe knowledge/quality/sonar.md §3.
#
# projectKey/organization/host.url stehen in der pom.xml (<properties>):
#   <sonar.organization>__SONAR_ORG__</sonar.organization>
#   <sonar.projectKey>__SONAR_PROJECT_KEY__</sonar.projectKey>
#   <sonar.host.url>__SONAR_HOST_URL__</sonar.host.url>
name: SonarCloud Analysis

on:
  schedule:
    - cron: '0 4 1 * *'   # 1. des Monats, 04:00 UTC — periodische Baseline
  workflow_dispatch: {}     # Handstart (Actions-Tab / `gh workflow run`)

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true  # paralleler Schedule+Handstart -> nur der letzte Lauf

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # volle History für Blame/New-Code-Erkennung

      - name: Check SONAR_TOKEN
        id: check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN nicht gesetzt — Sonar-Analyse übersprungen (Org-Secret fehlt)."
          fi

      - name: Cache SonarCloud packages
        if: steps.check.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build + Test (App-JDK)
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '__APP_JAVA_VERSION__'   # z.B. 11 — App-Runtime, NICHT der Scanner
          cache: maven
      - name: Build + Test
        if: steps.check.outputs.run == 'true'
        run: ./mvnw -B -ntp verify

      - name: Set up Java 17 for Scanner
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'          # SonarCloud-Scanner braucht Java 17
      - name: SonarCloud Scanner
        if: steps.check.outputs.run == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B -ntp org.sonarsource.scanner.maven:sonar-maven-plugin:3.11.0.3922:sonar
