# Vorlage — von new-project nach .github/workflows/build.yml kopiert.
# Baut bei Push auf den Default-Branch ein Image und pusht nach ghcr.io — via
# eingebautem GITHUB_TOKEN (kein Push-Secret nötig). Typ-Spezifika stecken im Dockerfile.
# Security-Gate: secret-scan (gitleaks) MUSS grün sein, bevor das Image gebaut/gepusht wird.
name: build
on:
  push:
    # main UND master: new-project-Repos sind `main`, adoptierte Org-Forks erben oft
    # `master`. GitHub-Actions-Trigger können keine Variable lesen → beide listen, sonst
    # baut die CI auf einem master-Repo NIE (stiller Ausfall, kein ghcr-Image).
    branches: [main, master]
permissions:
  contents: read
  packages: write
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret-Scan (gitleaks)
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest detect --source=/repo --no-git --redact -v
  image:
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # EINE Build-Zeit-Quelle (docs/specs/build-version-stamping.md AC1): APP_VERSION
      # + git-SHA werden hier EINMAL bestimmt und unverändert an build-args UND Labels
      # weitergereicht. Keine zweite Versionsquelle (z.B. kein separates ENV im Dockerfile).
      - name: Build-Version bestimmen
        id: version
        run: |
          echo "app_version=$(TZ=Europe/Zurich date +'%y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}   # wird automatisch klein geschrieben
          tags: |
            type=raw,value=latest
            type=sha
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.app_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.version.outputs.created }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.app_version }}
            GIT_SHA=${{ github.sha }}
# Härtung später (train/teamLeader): Actions auf SHA pinnen.
#
# SECRETS — Build-Time-Pfad (INAKTIV, P1):
# Dieser Workflow enthält KEINEN decrypt-Schritt und KEIN App-Secret.
# App-Secrets leben in .env.gpg und werden ausschliesslich zur LAUFZEIT entschlüsselt
# (bash scripts/decrypt-env.sh auf dem Deploy-Host → docker run --env-file .env).
# Wenn eine App künftig ein Build-Time-Secret braucht (z.B. private Registry),
# kommt es als GitHub-Actions-Secret (secrets.<NAME>) in diesen Workflow —
# NICHT via .env.gpg-decrypt in CI (würde die geteilte Fabrik-Passphrase exponieren).
# Spec: docs/architecture/secrets-subsystem.md §8. Ein Diff, der die Fabrik-Passphrase
# oder einen .env.gpg-decrypt in diesen Workflow einführt, ist ein Critical-Befund.
