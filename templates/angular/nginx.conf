server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Build-Versionierung (docs/specs/build-version-stamping.md AC6): index.html UND
    # version.json (Versions-Stempel-Artefakt) no-cache ausliefern, damit die GUI-Version
    # nach jedem Deploy sofort mitzieht statt in einem Edge-/Browser-Cache einzufrieren
    # (flashrescue-Vorfall 2026-07-19) — das Stempel-Artefakt selbst friert sonst eine
    # Ebene unter index.html genauso ein.
    location ~ ^/(index\.html|version\.json)$ {
        add_header Cache-Control "no-cache";
    }

    # Angular-Routing: unbekannte Pfade auf index.html zurückfallen lassen.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
