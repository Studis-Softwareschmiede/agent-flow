# SQLite Compose Fragment — file-based DB, NO db service
#
# WARNUNG (knowledge/sql-sqlite.md R01): SQLite ist Single-Writer (Whole-DB-Lock).
# Deploy mit MAXIMAL 1 App-Replica. Niemals `deploy.replicas: >1`,
# `docker compose up --scale app=N` mit N>1, oder Load-Balancer mit mehreren App-Backends.
# Multi-Replica auf demselben SQLite-File = stiller Datenverlust / DB-Korruption.
# Wenn Skalierung gebraucht wird: Dialekt auf postgres oder mysql wechseln.
#
# Pattern (Spec §5 SQLite-Sonderfall, §16-R4 separates migrations-Image):
#   - KEIN `db`-Service (SQLite ist eine Datei, kein Server).
#   - `migrations`-Service (one-shot) baked sqlite-CLI + bash in Alpine, applied
#     `db_scripts/*.sql` einmalig und beendet sich (`restart: "no"`).
#     `bash` ist Pflicht-Dependency: run-migrations.sh nutzt bash-Features
#     (shopt nullglob, process substitution, here-strings, ${var:0:3}) —
#     Alpines busybox-`ash` reicht NICHT (Smoke-Test PR #36 hat das aufgedeckt).
#   - Volume `db_data` hält das DB-File (`/data/app.db`).
#   - Der APP-Container MUSS dasselbe Volume mounten und `DB_PATH=/data/app.db`
#     als Env setzen, sonst sieht die App keine Daten.
#
# Erwartetes Wiring im App-Service (vom App-Compose ergänzen):
#   services:
#     app:
#       depends_on:
#         migrations:
#           condition: service_completed_successfully
#       environment:
#         DB_PATH: ${DB_PATH:-/data/app.db}
#       volumes:
#         - db_data:/data

services:
  migrations:
    image: alpine:3.20
    restart: "no"
    environment:
      DB_PATH: ${DB_PATH:-/data/app.db}
    volumes:
      - db_data:/data
      - ./db_scripts:/db_scripts:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "apk add --no-cache bash sqlite >/dev/null && /db_scripts/run-migrations.sh"

volumes:
  db_data: {}
