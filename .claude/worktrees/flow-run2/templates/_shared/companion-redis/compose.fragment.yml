# compose.fragment.yml — companion-redis template (Spec §17)
#
# Companion-Service: Cache / Queue / Sessions / Pub-Sub.
# Kein DBA, keine Migrations, kein Backup-Runner.
#
# Scope-Lock (Spec §17):
#   - Companions sind stateful Sidecars OHNE Schema-Evolution.
#   - Kein `migrations`-Service, kein `_schema_migrations`-Marker, keine
#     `db_scripts/`-Konvention — wer Schema/Migrations/Backup braucht,
#     gehört ins DB-Subsystem (§5/§6/§7), nicht in den Companion-Pfad.
#   - Detection beeinflusst `profile.db_dialect` NICHT — Companions
#     leben in `profile.companions: [...]` (Spec §2 + §17).
#
# Pflicht-Felder (analog §5):
#   - restart: unless-stopped
#   - healthcheck via `redis-cli ping`
#   - eindeutiges named volume `redis_data` (AOF/RDB-Snapshots)
#   - KEIN Port-Mapping — Redis ist nur intern (über das compose-
#     Default-Network) erreichbar; Apps verbinden via Service-DNS `redis`.
#     Für Dev-Inspektion gezielt `docker compose exec redis redis-cli`
#     statt host-Port-Exposure (Security-Floor).
#
# Production-Hinweis: Default-Container hat KEIN Passwort (intern-only
# reicht im SMB-Setup). Wenn Password-Auth nötig (Multi-Tenant-VPS,
# Cross-Network-Access), siehe README „Production" — Setup via
# `--requirepass` + `REDIS_PASSWORD` env in der App.

services:
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-app}_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    # ^ NICHT aktivieren. Redis ist Companion = intern-only. Dev-Inspektion
    #   via `docker compose exec redis redis-cli` (Spec §17 Scope-Lock).

volumes:
  redis_data: {}
