befund_2026_07_08: 'Vierter E2E-Befund 2026-07-08 (Datei-Übergabe funktioniert jetzt,
  aber): Der regression-define-Agent schreibt in die ergebnis_datei INVALIDES JSON
  — nicht-escaptes gerades ASCII-Anführungszeichen mitten in einem deutschen String-Wert.
  Konkret (dev-gui bereich=vps, Datei 1c6fe822...json, Zeile 13): "Die VPS-Ansicht
  öffnen (Kachel „VPS")" — das gerade " nach VPS schließt den JSON-String vorzeitig
  → JSONDecodeError "Expecting , delimiter" (line 13). Der Runner meldet korrekt "Ergebnisdatei
  kein gültiges JSON". WURZEL: Der Agent generiert das JSON per Hand-Text; bei deutschen
  Prüf-/Schritt-Texten mit eingebetteten Anführungszeichen entstehen Escaping-Fehler.
  FIX-RICHTUNG: Der Agent MUSS garantiert valides JSON produzieren — String-Werte
  strikt escapen (alle " → \" bzw. konsequent typografische „ " verwenden), ODER das
  Objekt strukturiert bauen und serialisieren statt frei zu tippen. Testfall: ein
  Vorschlag mit Anführungszeichen in schritte/pruefpunkte muss valides JSON in ergebnis_datei
  ergeben (json.load erfolgreich). Optional dev-gui-seitig: Runner-Toleranz (best-effort-Repair)
  erwägen, aber Primärfix ist der Agent.'
