befund_2026_07_17: 'Verifiziert 2026-07-17 (dev-gui-Ledger, flow/L05 + eigene Analyse):
  vier korrupte

  Zeilen (Item S-289, 2026-07-03) liessen JEDEN Rollup ab dem 03.07. still auf Defaults

  laufen (iters=1/crit=0/imp=0/secs_total=0). Ursache: `jq -s` über alle Zeilen ist

  atomar — eine unparsbare Zeile → Exit 5 → `|| DEFAULT` greift → alle Aggregate falsch,

  ohne jedes Signal. 14 items.jsonl-Zeilen in dev-gui waren betroffen (lokal repariert).

  Der Defekt sitzt an ZWEI Stellen: metrics-append-item.sh (Rollup) und metrics-collect.sh

  (Token-Nachtrag — deshalb blieb tok_total dauerhaft null). Kur: zeilenweise parsen

  (jq -R -s ''split("\n") | map(fromjson? // empty)'') + sichtbare >&2-Warnung mit
  Anzahl

  übersprungener Zeilen. Vorbild im selben Repo: scripts/metrics-aggregate.sh read_jsonl()

  (Python try/except JSONDecodeError: pass). dev-gui hält byte-identische Kopien beider

  Skripte — die müssen nachgezogen werden (separater Task).

