id: F-002
title: Schätzung zur Planungszeit — Estimation bei Story-Erstellung
goal: 'Die A-priori-Schätzung (size_est + dispo_est/ep_est + confidence + estimate_note)
  entsteht beim Anlegen einer Story durch den requirement-Agenten und steht ab Geburt
  in der Story-YAML — statt erst zur Ausführungszeit in /flow §1a. Dadurch sind Schätzungen
  für Priorisierung, Kapazitätsplanung und Split-Entscheidungen vor dem Lauf verfügbar
  und in der GUI sichtbar. Kernprinzip: Schätzen gehört zur Planung (requirement),
  nicht zur Ausführung (/flow). Quellen-Trennung: Soll = Story-YAML (von requirement),
  Ist = Ledger items.jsonl (ausschliesslich von /flow).

  '
status: Active
priority: P1
spec: docs/specs/metrics-estimation.md
definition_of_done: 'metrics-estimation.md v2 mit AC7-AC10 ist approved; requirement
  schätzt bei Story-Anlage (size_est/dispo_est/confidence/estimate_note in Story-YAML,
  estimator nur bei L/XL); /flow §1a liest die Werte und fällt nur bei fehlenden Feldern
  auf die Heuristik zurück, ohne vorhandene Schätzungen zu überschreiben; requirement
  schreibt nie ins Ledger; Alt-Stories ohne Schätzfelder laufen rückwärtskompatibel.
  AC7-AC10 gruen.

  '
